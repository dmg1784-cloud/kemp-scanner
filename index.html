<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>KEMP QR Scanner</title>

<link
    rel="stylesheet"
    href="style.css">

<link
    rel="manifest"
    href="manifest.json">

<meta
    name="theme-color"
    content="#1976d2">

<meta
    name="apple-mobile-web-app-capable"
    content="yes">

<meta
    name="apple-mobile-web-app-status-bar-style"
    content="default">

<meta
    name="mobile-web-app-capable"
    content="yes">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<!-- ==========================================
     FLASH OVERLAY
=========================================== -->

<div id="flashOverlay"></div>

<div class="container">

<h1>KEMP Scanner</h1>

<!-- ==========================================
     STAFF LOGIN
=========================================== -->

<section
    id="loginSection"
    class="card">

<h2>👤 Staff Login</h2>

<input
    id="staffId"
    type="text"
    placeholder="Staff ID"
    autocomplete="username">

<input
    id="staffPin"
    type="password"
    placeholder="PIN"
    autocomplete="current-password">

<button
    id="loginBtn">

Login

</button>

</section>
     <!-- ==========================================
     SCANNER SECTION
=========================================== -->

<section
    id="scannerSection"
    style="display:none;">

<div class="card">

<div id="currentStaff">

Not Logged In

</div>

<button
    id="changeStaffBtn"
    type="button">

🔄 Change Staff

</button>

</div>

<div class="card buttons">

<button
    id="startBtn"
    type="button">

▶️ Start Scanner

</button>

<button
    id="stopBtn"
    type="button">

⏹️ Stop Scanner

</button>

</div>

<div
    id="reader"
    aria-label="QR Scanner">

</div>

<div class="manual-toolbar">

<button
    id="manualBtn"
    type="button">

⌨ Manual Entry

</button>

</div>

<div id="status">

🟢 Online

</div>

<div id="result">

Ready to Scan

</div>

</section>
     <!-- ==========================================
     MANUAL ENTRY MODAL
=========================================== -->

<div
    id="manualModal"
    class="modal">

<div class="modal-content">

<h2>

Manual QR Entry

</h2>

<p>

If the QR code cannot be scanned,
enter the QR token manually.

</p>

<input
    id="manualCode"
    type="text"
    placeholder="Enter QR Token"
    autocomplete="off"
    spellcheck="false">

<div class="manual-buttons">

<button
    id="verifyManualBtn"
    type="button">

✅ Verify

</button>

<button
    id="cancelManualBtn"
    class="secondary"
    type="button">

✖ Cancel

</button>

</div>

</div>

</div>

</div>

<script src="offline.js"></script>

<script src="app.js"></script>

</body>

</html>
