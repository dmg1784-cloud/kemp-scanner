<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>KEMP Scanner</title>

<link
rel="stylesheet"
href="style.css">

<link
rel="manifest"
href="manifest.json">

<meta
name="theme-color"
content="#1976d2">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<!-- Flash Overlay -->
<div id="flashOverlay"></div>

<div class="container">

<h1>KEMP Scanner</h1>

<!-- =========================
     STAFF LOGIN
========================= -->

<div
class="card"
id="loginCard">

<h2>👤 Staff Login</h2>

<input
id="staffId"
type="text"
placeholder="Staff ID (ex. ADM001)"
autocomplete="username">

<input
id="staffPin"
type="password"
placeholder="PIN"
autocomplete="current-password">

<button id="loginBtn">

Login

</button>

</div>

<!-- =========================
     SCANNER
========================= -->

<div
id="scannerSection"
style="display:none;">

<div class="card">

<div id="currentStaff"></div>

<button id="changeStaffBtn">

Change Staff

</button>

</div>

<div class="card buttons">

<button id="startBtn">

▶️ Start Scanner

</button>

<button id="stopBtn">

⏹️ Stop Scanner

</button>

</div>

<div id="reader"></div>

<!-- Manual Entry -->

<div
class="manual-toolbar">

<button
id="manualBtn"
type="button">

⌨ Manual Entry

</button>

</div>

<div id="status">

🟢 Online

</div>

<div id="result">

Ready

</div>

</div>

</div>

<!-- =========================
     MANUAL ENTRY MODAL
========================= -->

<div
id="manualModal"
class="manual-modal">

<div class="manual-card">

<h2>

Manual QR Entry

</h2>

<p>

If the QR code cannot be scanned,
enter the QR token manually.

</p>

<input
id="manualCode"
type="text"
placeholder="Enter QR Token"
autocomplete="off"
spellcheck="false">

<div class="manual-buttons">

<button
id="verifyManualBtn">

✅ Verify

</button>

<button
id="cancelManualBtn"
class="secondary">

✖ Cancel

</button>

</div>

</div>

</div>

<script src="offline.js"></script>
<script src="app.js"></script>

</body>
</html>
