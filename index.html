<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>KEMP Scanner</title>

  <link rel="stylesheet" href="style.css">

  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#1976d2">

  <script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

  <h1>KEMP Scanner</h1>

  <div class="card" id="loginCard">

    <h3>Staff Login</h3>

    <input
      type="text"
      id="staffName"
      placeholder="Enter Staff Name">

    <button id="loginBtn">
      Continue
    </button>

  </div>

  <div id="scannerSection" style="display:none;">

    <div class="card">

      <div id="currentStaff"></div>

      <button id="changeStaffBtn">
        Change Staff
      </button>

    </div>

    <div class="card">

      <button id="startBtn">
        ▶️ Start Scanner
      </button>

      <button id="stopBtn">
        ⏹️ Stop Scanner
      </button>

    </div>

    <div id="reader"></div>

    <div id="status">
      🟢 Online
    </div>

    <div id="result">
      Ready to Scan
    </div>

  </div>

  <script src="offline.js"></script>
  <script src="app.js"></script>

</body>

</html>
